services:
  - type: web
    name: dubsync
    runtime: docker
    plan: starter
    region: singapore
    numInstances: 1
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    disk:
      name: dubsync-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DUBSYNC_DATA_DIR
        value: /var/data
      - key: DUBSYNC_PROVIDERS_PATH
        value: /app/provider.yaml
      - key: DUBSYNC_STYLE_PATH
        value: /app/style_profile.yaml
      - key: DUBSYNC_STATIC_DIR
        value: /app/web/dist
      - key: DUBSYNC_RETENTION_HOURS
        value: "24"
      - key: DUBSYNC_MAX_UPLOAD_BYTES
        value: "536870912"
      - key: DUBSYNC_MAX_BATCH_UPLOAD_BYTES
        value: "536870912"
      - key: DUBSYNC_MAX_SRT_BYTES
        value: "2097152"
      - key: DUBSYNC_MAX_SRT_LINES
        value: "60000"
      - key: DUBSYNC_MAX_SRT_CUES
        value: "20000"
      - key: DUBSYNC_MAX_SRT_LINE_BYTES
        value: "16384"
      - key: DUBSYNC_MAX_SRT_LINE_CHARS
        value: "4096"
      - key: DUBSYNC_MAX_RETAINED_STORAGE_BYTES
        value: "4294967296"
      - key: DUBSYNC_MAX_AUDIO_DURATION_SECONDS
        value: "14400"
      - key: DUBSYNC_FFPROBE_TIMEOUT_SECONDS
        value: "15"
      - key: DUBSYNC_MAX_NORMALIZED_AUDIO_BYTES
        value: "536870912"
      - key: DUBSYNC_MAX_JOB_WORK_BYTES
        value: "67108864"
      - key: DUBSYNC_MAX_JOB_STORAGE_BYTES
        value: "1073741824"
      - key: DUBSYNC_MIN_FREE_STORAGE_BYTES
        value: "2147483648"
      - key: DUBSYNC_MAX_AUDIO_SNIPPET_BYTES
        value: "33554432"
      - key: DUBSYNC_MAX_SUBMISSIONS_PER_HOUR
        value: "5"
      - key: DUBSYNC_MAX_OUTSTANDING_CHILD_JOBS
        value: "10"
      - key: DUBSYNC_WORKER_THREADS
        value: "1"
      - key: DUBSYNC_CLEANUP_INTERVAL_SECONDS
        value: "300"
      - key: DUBSYNC_ACTIVE_JOB_TIMEOUT_HOURS
        value: "24"
      - key: DUBSYNC_FFMPEG_TIMEOUT_SECONDS
        value: "1800"
      - key: DUBSYNC_PROCESSING_INLINE
        value: "0"
      - key: DUBSYNC_ENABLE_DOCS
        value: "0"
      - key: DUBSYNC_REQUIRE_JOB_ACCESS_CODE
        value: "1"
      - key: DUBSYNC_JOB_ACCESS_CODE
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
